# Ralphy Configuration
# https://github.com/michaelshimeles/ralphy

# Project info (auto-detected, edit if needed)
project:
  name: "BIT RAGE SYSTEMS"
  language: "Python"
  framework: "FastAPI"
  description: "24 AI agent API — FastAPI on Railway. LLM providers: OpenAI, Anthropic, Gemini, Grok."

# Commands
commands:
  test: "pytest tests/ -v"
  lint: "ruff check ."
  build: ""

# Rules - instructions the AI MUST follow
rules:
  - "Python 3.12, FastAPI framework"
  - "LLM calls go through utils/llm_client.call_llm()"
  - "All 24 agents live under agents/ with __init__.py exposing run()"
  - "API entry point is api/rapidapi.py, intake mounted at /intake"
  - "Never hardcode API keys — read from .env via os.getenv()"
  - "Use stdlib where possible, minimize new dependencies"
  - "Follow existing patterns in agents/ for new agent work"

# Boundaries - files/folders the AI should not modify
boundaries:
  never_touch:
    - ".env"
    - "*.json"
    - "data/**"
    - "output/**"
    - "*.lock"
