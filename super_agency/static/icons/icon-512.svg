<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="80" fill="#0a0a0f"/>
  <rect x="16" y="16" width="480" height="480" rx="72" fill="none" stroke="#00ffff" stroke-width="3" opacity="0.3"/>
  <!-- M letter stylized as matrix grid -->
  <g transform="translate(80,100)">
    <!-- Left column -->
    <rect x="0" y="0" width="44" height="300" rx="10" fill="#00ffff"/>
    <!-- Left diagonal -->
    <rect x="56" y="0" width="44" height="192" rx="10" fill="#00ffff" opacity="0.7" transform="rotate(20,78,96)"/>
    <!-- Center -->
    <rect x="154" y="64" width="44" height="236" rx="10" fill="#00ff88"/>
    <!-- Right diagonal -->
    <rect x="252" y="0" width="44" height="192" rx="10" fill="#00ffff" opacity="0.7" transform="rotate(-20,274,96)"/>
    <!-- Right column -->
    <rect x="308" y="0" width="44" height="300" rx="10" fill="#00ffff"/>
  </g>
  <!-- Pulse dots at bottom -->
  <circle cx="170" cy="448" r="10" fill="#00ff88" opacity="0.8"/>
  <circle cx="256" cy="448" r="10" fill="#00ffff"/>
  <circle cx="342" cy="448" r="10" fill="#00ff88" opacity="0.8"/>
</svg>
