<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <rect width="192" height="192" rx="32" fill="#0a0a0f"/>
  <rect x="8" y="8" width="176" height="176" rx="28" fill="none" stroke="#00ffff" stroke-width="2" opacity="0.3"/>
  <!-- M letter stylized as matrix grid -->
  <g transform="translate(32,40)">
    <!-- Left column -->
    <rect x="0" y="0" width="16" height="112" rx="4" fill="#00ffff"/>
    <!-- Left diagonal -->
    <rect x="20" y="0" width="16" height="72" rx="4" fill="#00ffff" opacity="0.7" transform="rotate(20,28,36)"/>
    <!-- Center -->
    <rect x="56" y="24" width="16" height="88" rx="4" fill="#00ff88"/>
    <!-- Right diagonal -->
    <rect x="92" y="0" width="16" height="72" rx="4" fill="#00ffff" opacity="0.7" transform="rotate(-20,100,36)"/>
    <!-- Right column -->
    <rect x="112" y="0" width="16" height="112" rx="4" fill="#00ffff"/>
  </g>
  <!-- Pulse dots at bottom -->
  <circle cx="64" cy="168" r="4" fill="#00ff88" opacity="0.8"/>
  <circle cx="96" cy="168" r="4" fill="#00ffff"/>
  <circle cx="128" cy="168" r="4" fill="#00ff88" opacity="0.8"/>
</svg>
