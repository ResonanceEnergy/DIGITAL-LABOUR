repos:
  # Code formatting with Black
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        language_version: python3
        args: ["--line-length=99"]
        exclude: ^(archive|repo_backups|repo_depot|tests/manual)/

  # Import sorting with isort
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile=black", "--line-length=99"]
        exclude: ^(archive|repo_backups|repo_depot|tests/manual)/

  # Remove unused imports with autoflake
  - repo: https://github.com/PyCQA/autoflake
    rev: v2.3.1
    hooks:
      - id: autoflake
        args:
          - --in-place
          - --remove-all-unused-imports
          - --remove-unused-variables
        exclude: ^(archive|repo_backups|repo_depot|tests/manual)/

  # Flake8 linting
  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        args: ["--max-line-length=99", "--extend-ignore=E203,W503"]
        exclude: ^(archive|repo_backups|repo_depot|tests/manual)/

  # Type checking with mypy (optional - can be slow)
  # - repo: https://github.com/pre-commit/mirrors-mypy
  #   rev: v1.8.0
  #   hooks:
  #     - id: mypy
  #       args: ['--ignore-missing-imports']
  #       exclude: ^(archive|repo_backups|repo_depot|tests)/

  # Reject OneDrive conflict files
  - repo: local
    hooks:
      - id: no-onedrive-conflicts
        name: reject OneDrive conflict duplicates
        entry: bash -c 'echo "OneDrive conflict file detected:" "$@" && exit 1' --
        language: system
        files: (-GRIP's MacBook Air|-ResonanceEnergy)\.
        types: [file]

  # General pre-commit checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      # Check for files that would conflict on case-insensitive filesystems
      - id: check-case-conflict
      # Ensure files end with newline
      - id: end-of-file-fixer
        exclude: ^(archive|repo_backups|repo_depot|tests/manual)/
      # Remove trailing whitespace
      - id: trailing-whitespace
        exclude: ^(archive|repo_backups|repo_depot|tests/manual)/
      # Check YAML syntax
      - id: check-yaml
        args: ["--unsafe"]
      # Check JSON syntax
      - id: check-json
      # Check TOML syntax
      - id: check-toml
      # Detect AWS credentials
      - id: detect-aws-credentials
        args: ["--allow-missing-credentials"]
      # Detect private keys
      - id: detect-private-key
      # Check for merge conflict markers
      - id: check-merge-conflict
      # Check executable scripts have shebang
      - id: check-executables-have-shebangs
      # Check for debugger imports
      - id: debug-statements
        exclude: ^(archive|repo_backups|repo_depot|tests/manual)/

# CI/CD Configuration
ci:
  autofix_commit_msg: "🔧 auto-fix: pre-commit hooks"
  autofix_prs: true
  autoupdate_branch: "main"
  autoupdate_commit_msg: "⬆️ pre-commit autoupdate"
  autoupdate_schedule: monthly

# Default stages
default_stages: [commit, push]
